<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>うちのコ日常アルバム 起動ゲート</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #FFF0F2;
      color: #3D2D2D;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }
    .card {
      background-color: white;
      border-radius: 28px;
      padding: 36px 24px;
      box-shadow: 0 16px 40px rgba(255, 182, 193, 0.35);
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(255, 192, 203, 0.4);
    }
    .badge {
      background-color: #FFE9EC;
      color: #C72C48;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 16px;
    }
    h1 {
      color: #C72C48;
      font-size: 26px;
      margin: 0 0 12px 0;
      font-weight: 800;
    }
    p {
      font-size: 14px;
      line-height: 1.6;
      color: #6D5C5C;
      margin: 0 0 28px 0;
    }
    .btn-launch {
      display: block;
      background-color: #C72C48;
      color: white;
      text-decoration: none;
      padding: 18px;
      border-radius: 16px;
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 24px;
      box-shadow: 0 8px 20px rgba(199, 44, 72, 0.3);
      transition: background-color 0.2s, transform 0.1s;
    }
    .btn-launch:active {
      background-color: #A52037;
      transform: scale(0.98);
    }
    .store-container {
      border-top: 1px solid #FFE4E6;
      padding-top: 24px;
      margin-top: 12px;
    }
    .store-title {
      font-size: 11px;
      font-weight: bold;
      color: #A08D8D;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }
    .store-buttons {
      display: flex;
      justify-content: space-around;
      gap: 12px;
    }
    .store-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #FFF8F8;
      color: #5D4D4D;
      text-decoration: none;
      padding: 12px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
      border: 1px solid #FFD6DC;
      transition: background-color 0.2s;
    }
    .store-btn:active {
      background-color: #FFE9EC;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">うちのコ日常アルバム🐾</div>
    <span style="font-size: 56px; display: block; margin-bottom: 12px;">🐾</span>
    <h1>最新バージョン起動</h1>
    <p>愛犬・愛猫の写真から心の声を紡ぎ出し、特別なストーリーを創作するアプリが立ち上がります🐾</p>
    
    <!-- 🚀 アプリ起動ボタン -->
    <a href="exp://nw0ig38-anonymous-8081.exp.direct" class="btn-launch">⚡ アプリを起動する (1タップ)</a>
    
    <div class="store-container">
      <div class="store-title">⚠️ アプリが起動しない・未インストールの方</div>
      <div class="store-buttons">
        <a href="https://apps.apple.com/app/expo-go/id984023788" class="store-btn" target="_blank">🍎 iPhone用 (App Store)</a>
        <a href="https://play.google.com/store/apps/details?id=host.exp.exponent" class="store-btn" target="_blank">🤖 Android用 (Google Play)</a>
      </div>
    </div>
  </div>
</body>
</html>
